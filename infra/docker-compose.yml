x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sports-postgres
    profiles: ["dev", "prod"]
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sports}
      POSTGRES_USER: ${POSTGRES_USER:-sports}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sports}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./scripts:/scripts
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sports}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sports-redis
    profiles: ["dev", "prod"]
    logging: *default-logging
    command: >
      sh -c "redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "${REDIS_PASSWORD:+-a}", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/dock108dev/sda-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    container_name: sports-api
    profiles: ["dev", "prod"]
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sports}:${POSTGRES_PASSWORD:-sports}@postgres:5432/${POSTGRES_DB:-sports}
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/0
      # Celery broker uses database 2 to match scraper worker
      CELERY_BROKER_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/2
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      # API authentication key (required for production/staging)
      API_KEY: ${API_KEY:-}
      # OpenAI configuration for AI-enhanced timeline generation
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_CLASSIFICATION: ${OPENAI_MODEL_CLASSIFICATION:-}
      OPENAI_MODEL_SUMMARY: ${OPENAI_MODEL_SUMMARY:-}
      # JWT / User Authentication
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      # Email — Resend (preferred) or SMTP (fallback); emails logged when neither is set
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      MAIL_FROM: ${MAIL_FROM:-noreply@scrolldownsports.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # OpenTelemetry — leave unset to disable tracing (no collector required)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - app
    volumes:
      - model-artifacts:/app/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # General-purpose worker: batch sims, flow generation, outcomes, experiments orchestrator.
  # Always has capacity — never blocked by training.
  api-worker:
    image: ghcr.io/dock108dev/sda-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    container_name: sports-api-worker
    profiles: ["dev", "prod"]
    logging: *default-logging
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=info", "--queues=celery", "--concurrency=2", "-O", "fair", "-n", "general@%h"]
    volumes:
      - model-artifacts:/app/models
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sports}:${POSTGRES_PASSWORD:-sports}@postgres:5432/${POSTGRES_DB:-sports}
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/0
      CELERY_BROKER_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/2
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_KEY: ${API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_CLASSIFICATION: ${OPENAI_MODEL_CLASSIFICATION:-}
      OPENAI_MODEL_SUMMARY: ${OPENAI_MODEL_SUMMARY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - app
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app.celery_app inspect ping -d general@$(hostname) --timeout=5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Training worker: only model training tasks. Lowest priority — never blocks other work.
  api-training-worker:
    image: ghcr.io/dock108dev/sda-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    container_name: sports-api-training-worker
    profiles: ["dev", "prod"]
    logging: *default-logging
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=info", "--queues=training", "--concurrency=${CELERY_TRAINING_CONCURRENCY:-2}", "-O", "fair", "-n", "training@%h"]
    volumes:
      - model-artifacts:/app/models
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sports}:${POSTGRES_PASSWORD:-sports}@postgres:5432/${POSTGRES_DB:-sports}
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/0
      CELERY_BROKER_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/2
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_KEY: ${API_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - app

  scraper:
    image: ghcr.io/dock108dev/sda-scraper:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/scraper.Dockerfile
    container_name: sports-scraper
    profiles: ["dev", "prod"]
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sports}:${POSTGRES_PASSWORD:-sports}@postgres:5432/${POSTGRES_DB:-sports}
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/2
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: "2"
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      CBB_STATS_API_KEY: ${CBB_STATS_API_KEY:-}
      DATAGOLF_API_KEY: ${DATAGOLF_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS:-}
      API_KEY: ${API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_SUMMARY: ${OPENAI_MODEL_SUMMARY:-gpt-4o}
      OPENAI_MODEL_CLASSIFICATION: ${OPENAI_MODEL_CLASSIFICATION:-gpt-4o-mini}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - app
    volumes:
      - scraper-cache:/app/scraper/game_data
    healthcheck:
      test: ["CMD-SHELL", "celery -A sports_scraper.celery_app.app inspect ping -d celery@$(hostname) --timeout=5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 5

  scraper-beat:
    image: ghcr.io/dock108dev/sda-scraper:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/scraper.Dockerfile
    container_name: sports-scraper-beat
    profiles: ["dev", "prod"]
    logging: *default-logging
    command: ["celery", "-A", "sports_scraper.celery_app.app", "beat", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sports}:${POSTGRES_PASSWORD:-sports}@postgres:5432/${POSTGRES_DB:-sports}
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/2
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: "2"
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      CBB_STATS_API_KEY: ${CBB_STATS_API_KEY:-}
      DATAGOLF_API_KEY: ${DATAGOLF_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS:-}
      API_KEY: ${API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_SUMMARY: ${OPENAI_MODEL_SUMMARY:-gpt-4o}
      OPENAI_MODEL_CLASSIFICATION: ${OPENAI_MODEL_CLASSIFICATION:-gpt-4o-mini}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - app

  social-scraper:
    image: ghcr.io/dock108dev/sda-scraper:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/scraper.Dockerfile
    container_name: sports-social-scraper
    profiles: ["dev", "prod"]
    logging: *default-logging
    # Live social tasks only (final-whistle, game polling, mapping).
    # Concurrency=1 for consistent IP and sequential X requests.
    # Separated from bulk so multi-hour bulk jobs never block live tasks.
    command: ["celery", "-A", "sports_scraper.celery_app.app", "worker", "--loglevel=info", "--queues=social-scraper", "--concurrency=1"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sports}:${POSTGRES_PASSWORD:-sports}@postgres:5432/${POSTGRES_DB:-sports}
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/2
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: "2"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SCRAPER_ROLE: social
      # X auth cookies — injected directly into each browser context
      X_AUTH_TOKEN: ${X_AUTH_TOKEN:-}
      X_CT0: ${X_CT0:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - app
    # No healthcheck needed - social scraping is best-effort

  social-bulk:
    image: ghcr.io/dock108dev/sda-scraper:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/scraper.Dockerfile
    container_name: sports-social-bulk
    profiles: ["dev", "prod"]
    logging: *default-logging
    # Bulk social collection (collect_team_social, collect_social_for_league).
    # Runs on its own worker so long-running bulk jobs never block live tasks.
    command: ["celery", "-A", "sports_scraper.celery_app.app", "worker", "--loglevel=info", "--queues=social-bulk", "--concurrency=1"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sports}:${POSTGRES_PASSWORD:-sports}@postgres:5432/${POSTGRES_DB:-sports}
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/2
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: "2"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SCRAPER_ROLE: social
      # X auth cookies — injected directly into each browser context
      X_AUTH_TOKEN: ${X_AUTH_TOKEN:-}
      X_CT0: ${X_CT0:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - app
    # No healthcheck needed - social scraping is best-effort

  migrate:
    image: ghcr.io/dock108dev/sda-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    container_name: sports-migrate
    profiles: ["dev", "prod"]
    logging: *default-logging
    command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sports}:${POSTGRES_PASSWORD:-sports}@postgres:5432/${POSTGRES_DB:-sports}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS:-}
      API_KEY: ${API_KEY:-}
      CBB_STATS_API_KEY: ${CBB_STATS_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - app  # Needed for external API calls during data migrations

  web:
    image: ghcr.io/dock108dev/sda-web:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
      args:
        NEXT_PUBLIC_SPORTS_API_URL: ${NEXT_PUBLIC_SPORTS_API_URL:-http://localhost:8000}
        SPORTS_API_INTERNAL_URL: ${SPORTS_API_INTERNAL_URL:-http://api:8000}
    container_name: sports-web
    profiles: ["dev", "prod"]
    logging: *default-logging
    environment:
      # Browser requests should hit the host-mapped API port.
      NEXT_PUBLIC_SPORTS_API_URL: ${NEXT_PUBLIC_SPORTS_API_URL:-http://localhost:8000}
      # Server-side Next.js fetches run inside the web container; use the internal service name.
      SPORTS_API_INTERNAL_URL: ${SPORTS_API_INTERNAL_URL:-http://api:8000}
      # API authentication key for backend requests
      SPORTS_API_KEY: ${API_KEY:-}
      # Basic auth for production (uses same password as postgres)
      ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_KEY: ${API_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    image: postgres:16-alpine
    container_name: sports-backup
    profiles: ["dev", "prod"]
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sports}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sports}
      POSTGRES_DB: ${POSTGRES_DB:-sports}
      PGPASSWORD: ${POSTGRES_PASSWORD:-sports}
      PGHOST: postgres
    networks:
      - internal
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Ensure we're using UTC for all time calculations
        export TZ=UTC
        echo "Backup service started (TZ=UTC). Running initial backup..."
        /scripts/backup.sh
        echo "Daily backup scheduled at 14:00 UTC (9 AM EST / 10 AM EDT)..."
        while true; do
          # Calculate seconds until next 14:00 UTC
          CURRENT_HOUR=$$(date +%H)
          CURRENT_MIN=$$(date +%M)
          CURRENT_SEC=$$(date +%S)
          # Seconds since midnight
          NOW_SECS=$$((CURRENT_HOUR * 3600 + CURRENT_MIN * 60 + CURRENT_SEC))
          # Target: 14:00 = 50400 seconds since midnight
          TARGET_SECS=50400
          if [ "$$NOW_SECS" -ge "$$TARGET_SECS" ]; then
            # Already past 14:00, wait until tomorrow
            SLEEP_SECS=$$((86400 - NOW_SECS + TARGET_SECS))
          else
            SLEEP_SECS=$$((TARGET_SECS - NOW_SECS))
          fi
          echo "Next backup in $$((SLEEP_SECS / 3600))h $$((SLEEP_SECS % 3600 / 60))m at 14:00 UTC"
          sleep "$$SLEEP_SECS"
          /scripts/backup.sh
        done

  # OpenTelemetry Collector — receives OTLP from API and scraper workers,
  # exports traces to Tempo and metrics to Prometheus.
  # Only started when the "observability" profile is active:
  #   docker compose --profile observability up
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: sports-otel-collector
    profiles: ["observability"]
    logging: *default-logging
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:13133/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana — dashboard UI for pipeline coverage and observability metrics.
  # Only started when the "observability" profile is active:
  #   docker compose --profile observability up
  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: sports-grafana
    profiles: ["observability"]
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-sports}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      # Pass DB credentials through for datasource provisioning
      POSTGRES_USER: ${POSTGRES_USER:-sports}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sports}
      POSTGRES_DB: ${POSTGRES_DB:-sports}
      # Alert notification webhook — set to a Slack incoming webhook or similar
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/alerts:/etc/grafana/provisioning/alerting:ro
    ports:
      - "3001:3000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus — scrapes OTel collector metrics endpoint.
  # Only started when the "observability" profile is active:
  #   docker compose --profile observability up
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: sports-prometheus
    profiles: ["observability"]
    logging: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  log-relay:
    build:
      context: ./log-relay
    container_name: sports-log-relay
    profiles: ["dev", "prod"]
    logging: *default-logging
    group_add:
      - "${DOCKER_GID:-988}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9999/logs?container=sports-api&lines=1')\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  scraper-cache:
  model-artifacts:
  grafana-data:
  prometheus-data:

networks:
  internal:
    internal: true
  app:
