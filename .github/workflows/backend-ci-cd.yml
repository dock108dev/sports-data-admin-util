name: Backend CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      full_deploy:
        description: "Run full deploy (build + push + deploy to server)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test-scraper:
    name: Test Scraper
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ./scraper
          uv pip install pytest pytest-cov
      - name: Run scraper tests with coverage
        working-directory: scraper
        run: |
          source ../.venv/bin/activate
          pytest tests/ \
            --cov=sports_scraper \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            --cov-fail-under=80

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          uv venv --python 3.12
          uv pip install -r api/requirements.txt
          uv pip install pytest pytest-cov pytest-asyncio
      - name: Run API tests with coverage
        working-directory: api
        env:
          PYTHONPATH: .
        run: |
          source ../.venv/bin/activate
          pytest tests/ \
            --cov=app \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            --cov-fail-under=80

  lint-web:
    name: Lint & Type-check Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5  
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        run: pnpm install
      - name: Type check
        working-directory: web
        run: pnpm exec tsc --noEmit
      - name: Lint
        working-directory: web
        run: pnpm lint

  compile:
    name: Compile
    runs-on: ubuntu-latest
    needs: [test-scraper, test-api, lint-web]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: |
          uv venv --python 3.12
          uv pip install -r api/requirements.txt
          uv pip install -e ./scraper
      - name: Compile Python modules
        run: |
          source .venv/bin/activate
          python -m compileall api/app scraper/sports_scraper
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install web dependencies
        run: pnpm install
      - name: Compile web
        working-directory: web
        run: pnpm build

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: compile
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.full_deploy == 'true')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, web, scraper]
        include:
          - service: api
            dockerfile: infra/api.Dockerfile
          - service: web
            dockerfile: infra/web.Dockerfile
          - service: scraper
            dockerfile: infra/scraper.Dockerfile
    steps:
      - uses: actions/checkout@v6
      - name: Compute image tags
        id: image-tags
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          REPO="ghcr.io/${{ github.repository }}-${SERVICE}"
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PRIMARY="${REPO}:pr-${{ github.event.number }}-${SHORT_SHA}"
          else
            PRIMARY="${REPO}:${SHORT_SHA}"
          fi
          {
            echo "tags<<EOF"
            echo "${PRIMARY}"
            echo "${REPO}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.image-tags.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.full_deploy == 'true')
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GH_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,GH_REPO,DEPLOY_PATH,GH_REF,GH_EVENT_NAME,GH_BEFORE,GH_SHA
          script: |
            set -euo pipefail

            BASE_DIR="$DEPLOY_PATH"
            REPO_URL="https://x-access-token:${GHCR_TOKEN}@github.com/${GH_REPO}.git"
            BRANCH="${GH_REF}"

            echo "Ensuring base directory exists..."
            mkdir -p "$BASE_DIR"
            cd "$BASE_DIR"

            if [ ! -d ".git" ]; then
              echo "No git repo found. Initializing..."
              git init
              git remote add origin "$REPO_URL"
            else
              echo "Updating remote URL with token..."
              git remote set-url origin "$REPO_URL"
            fi

            echo "Fetching latest code..."
            git fetch origin

            echo "Resetting to origin/$BRANCH..."
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"

            CADDY_CHANGED=false
            if [ "${GH_EVENT_NAME:-}" = "push" ] && [ -n "${GH_BEFORE:-}" ] && [ -n "${GH_SHA:-}" ]; then
              if git diff --name-only "$GH_BEFORE" "$GH_SHA" -- infra/Caddyfile | grep -q "infra/Caddyfile"; then
                CADDY_CHANGED=true
              fi
            fi

            if [ "$CADDY_CHANGED" = true ]; then
              echo "Detected infra/Caddyfile change in this deploy. Updating active Caddy config..."

              if [ ! -f "infra/Caddyfile" ]; then
                echo "ERROR: infra/Caddyfile missing in repo checkout"
                exit 1
              fi

              if [ ! -f "/etc/caddy/Caddyfile" ]; then
                echo "ERROR: /etc/caddy/Caddyfile not found on server"
                exit 1
              fi

              python3 infra/scripts/update_caddy_site_block.py \
                infra/Caddyfile \
                /etc/caddy/Caddyfile \
                sports-data-admin.dock108.ai

              caddy validate --config /etc/caddy/Caddyfile
              systemctl reload caddy
              echo "Caddy reload complete."
            else
              echo "No infra/Caddyfile change detected; skipping Caddy update."
            fi

            if [ ! -f "infra/.env" ]; then
              echo "ERROR: infra/.env file missing in $BASE_DIR"
              exit 1
            fi

            echo "Changing to infra directory (loads .env + correct relative volume mounts)..."
            cd infra

            echo "Logging into GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "Pre-deploy cleanup (free space for new images)..."
            docker image prune -af --filter "until=1h" 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            echo "Pulling images..."
            docker compose --profile prod pull --policy always

            echo "Running migrations..."
            docker compose --profile prod run --rm migrate

            echo "Starting services..."
            docker compose --profile prod up -d --remove-orphans

            echo "Verifying API health..."
            for i in $(seq 1 30); do
              if docker inspect sports-api --format='{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; then
                echo "✅ API container healthy"
                break
              fi
              STATUS=$(docker inspect sports-api --format='{{.State.Status}}' 2>/dev/null || echo "missing")
              if [ "$STATUS" = "exited" ] || [ "$STATUS" = "missing" ]; then
                echo "❌ API container failed to start (status: $STATUS)"
                docker logs sports-api --tail=40 2>/dev/null || true
                exit 1
              fi
              echo "  Waiting for API health check ($i/30)..."
              sleep 5
            done

            # Final check — if we exhausted retries without healthy
            FINAL_STATUS=$(docker inspect sports-api --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
            if [ "$FINAL_STATUS" != "healthy" ]; then
              echo "❌ API did not become healthy within 150s (status: $FINAL_STATUS)"
              docker logs sports-api --tail=40 2>/dev/null || true
              exit 1
            fi

            echo "Post-deploy cleanup..."
            docker image prune -af
            docker builder prune -af

            echo "Deployment status:"
            docker compose --profile prod ps
