name: Backend CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      full_deploy:
        description: "Run full deploy (build + push + deploy to server)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test-scraper:
    name: Test Scraper
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -e ./scraper
          uv pip install pytest pytest-cov
          python -c "import pytest_cov; print('pytest-cov', pytest_cov.__version__)"
      - name: Run scraper tests with coverage
        working-directory: scraper
        run: |
          source ../.venv/bin/activate
          python -m pytest tests/ \
            --cov=sports_scraper \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            --cov-fail-under=80

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r api/requirements.txt
          uv pip install pytest pytest-cov pytest-asyncio pytest-timeout
          python -c "import pytest_cov; print('pytest-cov', pytest_cov.__version__)"
      - name: Run API tests with coverage
        working-directory: api
        env:
          PYTHONPATH: .
        run: |
          source ../.venv/bin/activate
          python -m pytest tests/ \
            --timeout=60 \
            --timeout-method=signal \
            --cov=app \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            --cov-fail-under=80

  lint-web:
    name: Lint & Type-check Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        run: pnpm install
      - name: Type check
        working-directory: web
        run: pnpm exec tsc --noEmit
      - name: Lint
        working-directory: web
        run: pnpm lint

  lint-no-swap-score:
    name: Lint · No _swap_score
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure _swap_score is not re-introduced
        run: |
          if grep -r '_swap_score' api/ scraper/ --include='*.py' -l; then
            echo "ERROR: _swap_score found in Python sources. This helper was removed in ISSUE-016; use ScoreObject {home, away} instead."
            exit 1
          fi
          echo "OK: _swap_score not found."

  lint-camel-case-schemas:
    name: Lint · camelCase response schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check all Pydantic response models have camelCase aliases
        run: python scripts/lint_camel_case_schemas.py

  lint-router-namespaces:
    name: Lint · Router namespaces (/api/v1 vs /api/admin)
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install API dependencies
        run: |
          uv venv --python 3.12
          uv pip install -r api/requirements.txt
      - name: Scan router registrations
        run: |
          source .venv/bin/activate
          python scripts/lint_router_namespaces.py

  lint-fk-ondelete:
    name: Lint · FK ondelete declarations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check all ForeignKey() calls declare ondelete=
        run: python scripts/lint_fk_ondelete.py

  lint-guardrails-sync:
    name: Lint · guardrails.ts ↔ validate_blocks.py sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check guardrails.ts mirrors validate_blocks.py constants
        run: python scripts/check_guardrails_sync.py

  lint-api-schema:
    name: Lint · camelCase fields in /api/v1/ OpenAPI schema
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install API dependencies
        run: |
          uv venv --python 3.12
          uv pip install -r api/requirements.txt
      - name: Dump OpenAPI schema and scan /api/v1/ response fields
        run: |
          source .venv/bin/activate
          python scripts/lint_openapi_camel_case.py

  lint-js-core-sync:
    name: Lint · js-core types sync with /api/v1/ schema
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install API dependencies
        run: |
          uv venv --python 3.12
          uv pip install -r api/requirements.txt
      - name: Check js-core types cover all /api/v1/ response fields
        run: |
          source .venv/bin/activate
          python scripts/check_js_core_sync.py

  security-bandit:
    name: Security · bandit scan (api/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install "bandit[toml]==1.7.9"
      - name: Run bandit on api/app
        run: |
          # -ll = fail only on medium+ severity. Config lives in api/pyproject.toml.
          bandit -r api/app -c api/pyproject.toml -ll

  security-detect-secrets:
    name: Security · detect-secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install detect-secrets
        run: pip install "detect-secrets==1.5.0"
      - name: Verify no new secrets introduced
        run: |
          detect-secrets scan --baseline .secrets.baseline \
            --exclude-files '(^|/)(coverage_html|node_modules|\.venv|dist|build)(/|$)'

  security-sql-interpolation:
    name: Security · SQL interpolation audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Grep api/app for SQL string interpolation
        run: python scripts/lint_sql_interpolation.py

  compile:
    name: Compile
    runs-on: ubuntu-latest
    needs:
      - test-scraper
      - test-api
      - lint-web
      - lint-no-swap-score
      - lint-camel-case-schemas
      - lint-router-namespaces
      - lint-api-schema
      - lint-guardrails-sync
      - lint-fk-ondelete
      - lint-js-core-sync
      - security-bandit
      - security-detect-secrets
      - security-sql-interpolation
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: |
          uv venv --python 3.12
          uv pip install -r api/requirements.txt
          uv pip install -e ./scraper
      - name: Compile Python modules
        run: |
          source .venv/bin/activate
          python -m compileall api/app scraper/sports_scraper
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install web dependencies
        run: pnpm install
      - name: Compile web
        working-directory: web
        run: pnpm build

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: compile
    if: >-
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.full_deploy == 'true')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, web, scraper]
        include:
          - service: api
            dockerfile: infra/api.Dockerfile
          - service: web
            dockerfile: infra/web.Dockerfile
          - service: scraper
            dockerfile: infra/scraper.Dockerfile
    steps:
      - uses: actions/checkout@v6
      - name: Compute image tags
        id: image-tags
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          REPO="ghcr.io/${{ github.repository }}-${SERVICE}"
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "tags<<EOF"
            echo "${REPO}:${SHORT_SHA}"
            echo "${REPO}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.full_deploy == 'true')
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GH_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,GH_REPO,DEPLOY_PATH,GH_REF,GH_EVENT_NAME,GH_BEFORE,GH_SHA
          script: |
            set -euo pipefail

            BASE_DIR="$DEPLOY_PATH"
            REPO_URL="https://x-access-token:${GHCR_TOKEN}@github.com/${GH_REPO}.git"
            BRANCH="${GH_REF}"

            echo "Ensuring base directory exists..."
            mkdir -p "$BASE_DIR"
            cd "$BASE_DIR"

            if [ ! -d ".git" ]; then
              echo "No git repo found. Initializing..."
              git init
              git remote add origin "$REPO_URL"
            else
              echo "Updating remote URL with token..."
              git remote set-url origin "$REPO_URL"
            fi

            echo "Fetching latest code..."
            git fetch origin

            echo "Resetting to origin/$BRANCH..."
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"

            CADDY_CHANGED=false
            if [ "${GH_EVENT_NAME:-}" = "push" ] && [ -n "${GH_BEFORE:-}" ] && [ -n "${GH_SHA:-}" ]; then
              if git diff --name-only "$GH_BEFORE" "$GH_SHA" -- infra/Caddyfile | grep -q "infra/Caddyfile"; then
                CADDY_CHANGED=true
              fi
            fi

            if [ "$CADDY_CHANGED" = true ]; then
              echo "Detected infra/Caddyfile change in this deploy. Updating active Caddy config..."

              if [ ! -f "infra/Caddyfile" ]; then
                echo "ERROR: infra/Caddyfile missing in repo checkout"
                exit 1
              fi

              if [ ! -f "/etc/caddy/Caddyfile" ]; then
                echo "ERROR: /etc/caddy/Caddyfile not found on server"
                exit 1
              fi

              if ! sudo -n true 2>/dev/null; then
                echo "ERROR: deploy user requires passwordless sudo for Caddy update commands."
                echo "Grant NOPASSWD sudo for python3 (writing /etc/caddy/Caddyfile), caddy validate, and systemctl reload caddy."
                exit 1
              fi

              sudo python3 infra/scripts/update_caddy_site_block.py \
                infra/Caddyfile \
                /etc/caddy/Caddyfile \
                sda.dock108.dev

              sudo caddy validate --config /etc/caddy/Caddyfile
              sudo systemctl reload caddy
              echo "Caddy reload complete."
            else
              echo "No infra/Caddyfile change detected; skipping Caddy update."
            fi

            if [ ! -f "infra/.env" ]; then
              echo "ERROR: infra/.env file missing in $BASE_DIR"
              exit 1
            fi

            echo "Changing to infra directory (loads .env + correct relative volume mounts)..."
            cd infra

            echo "Logging into GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "Pre-deploy cleanup (free space for new images)..."
            docker image prune -af --filter "until=1h" 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            echo "Pulling images..."
            docker compose --profile prod pull --policy always

            echo "Running migrations..."
            docker compose --profile prod run --rm migrate

            echo "Starting services..."
            # --force-recreate is required because we use :latest tags. Without
            # it, compose hashes the service config (which includes the tag
            # string but not the resolved image SHA) and decides "no change →
            # keep running container", silently skipping every deploy where
            # only the underlying image content changed. See the "deploys
            # 2-days-old container" incident in the deploy log.
            docker compose --profile prod up -d --remove-orphans --force-recreate

            echo "Verifying API health..."
            for i in $(seq 1 30); do
              if docker inspect sports-api --format='{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; then
                echo "✅ API container healthy"
                break
              fi
              STATUS=$(docker inspect sports-api --format='{{.State.Status}}' 2>/dev/null || echo "missing")
              if [ "$STATUS" = "exited" ] || [ "$STATUS" = "missing" ]; then
                echo "❌ API container failed to start (status: $STATUS)"
                docker logs sports-api --tail=40 2>/dev/null || true
                exit 1
              fi
              echo "  Waiting for API health check ($i/30)..."
              sleep 5
            done

            # Final check — if we exhausted retries without healthy
            FINAL_STATUS=$(docker inspect sports-api --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
            if [ "$FINAL_STATUS" != "healthy" ]; then
              echo "❌ API did not become healthy within 150s (status: $FINAL_STATUS)"
              docker logs sports-api --tail=40 2>/dev/null || true
              exit 1
            fi

            echo "Verifying containers are running the just-pulled images..."
            # Defense against the silent-no-op-deploy class of bugs: for each
            # long-running app container, read the image tag it was started
            # with, resolve that tag to the SHA currently in the local image
            # store, and compare to the SHA the container is actually running
            # on. Mismatch → compose declined to recreate (or pulled from a
            # different image namespace than it runs from). Either way: fail.
            #
            # Using the container's own `Config.Image` as the source of truth
            # keeps this check working regardless of image-naming conventions
            # in compose.yaml.
            check_image_sha() {
              local container="$1"
              local image_tag pulled_sha running_sha
              image_tag=$(docker inspect "$container" --format='{{.Config.Image}}' 2>/dev/null || echo "")
              if [ -z "$image_tag" ]; then
                echo "❌ Could not resolve image tag for $container (container missing?)"
                return 1
              fi
              pulled_sha=$(docker image inspect "$image_tag" --format='{{.Id}}' 2>/dev/null || echo "")
              running_sha=$(docker inspect "$container" --format='{{.Image}}' 2>/dev/null || echo "")
              if [ -z "$pulled_sha" ] || [ -z "$running_sha" ]; then
                echo "❌ Could not resolve image SHA for $container ($image_tag)"
                return 1
              fi
              if [ "$pulled_sha" != "$running_sha" ]; then
                echo "❌ $container is running a stale image ($image_tag)."
                echo "    pulled:  $pulled_sha"
                echo "    running: $running_sha"
                return 1
              fi
              echo "  ✅ $container ($image_tag) matches local store"
              return 0
            }

            STALE=0
            for container in sports-api sports-web sports-scraper; do
              if ! check_image_sha "$container"; then
                STALE=1
              fi
            done
            if [ "$STALE" -ne 0 ]; then
              echo "❌ One or more containers are running stale images. Common causes:"
              echo "   - \`docker compose up -d\` skipped recreation because :latest"
              echo "     tag didn't change (need --force-recreate)."
              echo "   - compose.yaml pulls from a different image namespace than"
              echo "     the build job pushes to."
              exit 1
            fi

            echo "Post-deploy cleanup..."
            docker image prune -af
            docker builder prune -af

            echo "Deployment status:"
            docker compose --profile prod ps
